<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Скрыть текст</title>
</head>
<body>
    <button id="toggleBtn">Спрятать текст</button>
    <div id="text">Опана</div>

    <script>
        'use strict';

        const btn = document.getElementById('toggleBtn');
        const textBlock = document.getElementById('text');

        btn.addEventListener('click', () => {
            if (textBlock.style.display === 'none') {
                textBlock.style.display = 'block';
                btn.textContent = 'Спрятать текст';
            } else {
                textBlock.style.display = 'none';
                btn.textContent = 'Показать текст';
            }
        });
    </script>
</body>
</html>
