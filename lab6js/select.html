<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Работа с Select</title>
</head>
<body>
    <h1>Работа с Select</h1>
    <select id="musicSelect">
        <option value="Rock">Рок</option>
        <option value="Blues" selected>Блюз</option>
    </select>
    <div id="output"></div>

    <script>
        'use strict';
        
        const select = document.getElementById('musicSelect');
        const output = document.getElementById('output');

        // 1. Вывести значение и текст текущей выбранной опции
        function logSelected() {
            const option = select.options[select.selectedIndex];
            output.innerHTML = `<p>Выбрано: <b>${option.text}</b> (${option.value})</p>`;
        }
        logSelected();

        // 2. Добавьте опцию Classic
        const newOption = document.createElement('option');
        newOption.value = "Classic";
        newOption.text = "Классика";
        select.add(newOption);

        // 3. Сделайте её выбранной
        select.value = "Classic";
        
        // Обновим вывод, чтобы видеть изменения
        logSelected();
    </script>
</body>
</html>
