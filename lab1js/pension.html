<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пенсионный калькулятор</title>
</head>
<body>
    <h1>Пенсионный калькулятор</h1>
    <form id="pensionForm">
        <!-- Поле возраста -->
        <label>
            Возраст:
            <input type="number" name="age" required min="0">
        </label>
        <br><br>
        
        <!-- Группа радиокнопок -->
        <fieldset style="border: none; padding: 0;">
            <legend>Пол:</legend>
            <label>
                <input type="radio" name="gender" value="male" required> Мужской
            </label>
            <label>
                <input type="radio" name="gender" value="female" required> Женский
            </label>
        </fieldset>
        
        <br>
        <button type="submit">Рассчитать</button>
    </form>
    <br>
    <textarea id="result" rows="4" cols="50" readonly></textarea>
    
    <script src="js/pension.js"></script>
</body>
</html>
